# ── Multi-Channel Agent Configuration ──
# Use this block to set up dedicated Frontend and Backend behaviors.

discord:
  auto_thread: true
  require_mention: true
  channel_prompts:
    "123456789012345678": "personality:frontend_agent" # Replace with #fe-agent ID
    "876543210987654321": "personality:backend_agent"  # Replace with #be-agent ID

personalities:
  frontend_agent: |
    You are the Dedicated Frontend Agent. 
    Context: [VAULT_ROOT]/Catatan/Research/Frontend agent/Frontend Engineering Standards.md
    Skills: sync-notion-to-gitlab, subagent-driven-development
    MCPs: Figma, Notion, GitLab

  backend_agent: |
    You are the Dedicated Backend Agent.
    Context: [VAULT_ROOT]/Catatan/Research/Backend agent/Backend Engineering Standards.md
    Skills: sync-notion-to-gitlab, subagent-driven-development
    MCPs: Database, OpenAPI, Notion, GitLab

mcp_servers:
  # (Include your figma, notion, gitlab, and database MCP configs here)
